name: docs

# Builds the Sphinx documentation on every push and pull request, and publishes
# it to GitHub Pages from the default branch.
#
# Before the first deploy, enable Pages for the repository:
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
# Without that, the deploy job fails with "Pages site not found".

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; queued runs supersede each other rather than racing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install the project and its docs dependencies
        run: uv sync --extra docs

      # --strict turns Sphinx warnings into errors, so a broken cross-reference
      # or a malformed docstring fails the build rather than shipping quietly.
      - name: Build documentation
        run: uv run intellipy-docs --strict --output _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    # Pull requests build but do not publish.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
